name: K-SNS UI CI

on:
  push:
    branches: ["main", "develop", "feat/**", "fix/**", "docs/**"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

jobs:
  build-lint:
    name: Build and lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Boundary regression tests
        run: node --test tests/*.test.mjs

      - name: Build (includes type-check)
        run: npm run build
        env:
          NEXT_PUBLIC_APP_DOMAIN: sns.kariya.ng
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Lint
        run: npm run lint
